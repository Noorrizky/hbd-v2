<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD untukmu! ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Quicksand', sans-serif; background: radial-gradient(circle, #fff5f7 0%, #fee2e2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .font-romance { font-family: 'Dancing Script', cursive; }
        .countdown-text { font-size: 5rem; font-weight: 800; color: #db2777; }
        .cake-container { cursor: pointer; transition: transform 0.3s; position: relative; display: inline-block; }
        .cake-container:hover { transform: scale(1.1); }
        .candle-flame { width: 15px; height: 25px; background: #ff9d00; border-radius: 50% 50% 20% 20%; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); filter: blur(1px); box-shadow: 0 0 15px #ff9d00; animation: flicker 0.6s infinite alternate; }
        @keyframes flicker { from { opacity: 0.8; transform: translateX(-50%) scale(0.9); } to { opacity: 1; transform: translateX(-50%) scale(1.1); } }
        .polaroid { background: white; padding: 10px 10px 30px 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transform: rotate(-3deg); }
        .polaroid img { width: 100%; height: 180px; object-fit: cover; }
        .hidden-element { display: none; }
        .wa-button { background-color: #25D366; color: white; padding: 12px 24px; border-radius: 50px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .wa-button:hover { background-color: #128C7E; transform: scale(1.05); }
    </style>
</head>
<body>

    <audio id="bdayMusic" loop>
        <source src="URL_LAGU_KAMU_DISINI.mp3" type="audio/mpeg">
    </audio>

    <div id="main-card" class="bg-white/95 p-8 rounded-[2.5rem] shadow-2xl max-w-sm w-full mx-4 text-center border-4 border-white animate__animated animate__zoomIn">
        
        <div id="step-initial">
            <div class="text-7xl mb-6 animate__animated animate__bounce animate__infinite">🎁</div>
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Seseorang mengirimkanmu kado digital...</h1>
            <button onclick="startEverything()" class="bg-gradient-to-r from-pink-500 to-rose-500 text-white font-bold py-4 px-10 rounded-2xl shadow-lg transition-all">
                Buka Paket Sekarang
            </button>
        </div>

        <div id="step-countdown" class="hidden-element">
            <p class="text-pink-400 font-semibold mb-4 uppercase tracking-widest">Siap-siap ya...</p>
            <div id="countdown-number" class="countdown-text animate__animated animate__heartBeat animate__infinite">5</div>
        </div>

        <div id="step-final" class="hidden-element">
            <div class="cake-container mb-4" onclick="blowCandle()">
                <div id="flame" class="candle-flame"></div>
                <div class="text-6xl">🎂</div>
                <p id="candle-tip" class="text-[10px] mt-2 text-pink-400 italic font-bold">KLIK UNTUK TIUP LILIN!</p>
            </div>
            
            <h2 class="text-3xl font-romance text-pink-600 mb-2">Happy Birthday! ✨</h2>
            
            <div id="photo-frame" class="hidden-element animate__animated mb-4">
                <div class="polaroid mx-auto max-w-[180px]">
                    <img src="URL_FOTO_CRUSH_DISINI.png" alt="Foto Crush">
                </div>
            </div>

            <p id="typewriter" class="text-gray-700 leading-relaxed mb-6 italic text-sm min-h-[60px]"></p>
            
            <div id="wa-container" class="hidden-element animate__animated animate__fadeInUp">
                <a href="https://wa.me/6281254284547?text=Makasih%20ya%20surprise%20webnya!%20Lucu%20banget%20sumpah%20🥺💖" target="_blank" class="wa-button shadow-lg">
                    <span>Kirim Balasan</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        const music = document.getElementById('bdayMusic');
        const textToType = "Selamat ulang tahun! Semoga tahun ini membawa banyak keajaiban, tawa, dan kebahagiaan yang nggak terbatas buat kamu. Tetap jadi orang baik ya!";

        function startEverything() {
            music.play().catch(e => console.log(e));
            document.getElementById('step-initial').classList.add('hidden-element');
            document.getElementById('step-countdown').classList.remove('hidden-element');
            
            let count = 5;
            const timer = setInterval(() => {
                count--;
                if (count > 0) {
                    document.getElementById('countdown-number').innerText = count;
                } else {
                    clearInterval(timer);
                    showBirthday();
                }
            }, 1000);
        }

        function showBirthday() {
            document.getElementById('step-countdown').classList.add('hidden-element');
            document.getElementById('step-final').classList.remove('hidden-element');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function blowCandle() {
            const flame = document.getElementById('flame');
            const photo = document.getElementById('photo-frame');
            const wa = document.getElementById('wa-container');
            
            if (flame && !flame.classList.contains('hidden')) {
                flame.classList.add('hidden');
                document.getElementById('candle-tip').innerText = "Yayy! Wish-mu terkabul! ✨";
                photo.classList.remove('hidden-element');
                photo.classList.add('animate__fadeInDown');

                // Start Typewriter
                let i = 0;
                const speed = 50;
                function type() {
                    if (i < textToType.length) {
                        document.getElementById("typewriter").innerHTML += textToType.charAt(i);
                        i++;
                        setTimeout(type, speed);
                    } else {
                        wa.classList.remove('hidden-element');
                    }
                }
                type();

                confetti({ particleCount: 100, velocity: 30, spread: 360, origin: { y: 0.4 } });
            }
        }
    </script>
</body>
</html>
